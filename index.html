<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pour Toi ❤️</title>
    <style>

    @font-face {
        font-family: lovecustom;
        src: url(Love.otf);
    }
        body {
            margin: 0;
            height: 100vh;
            background: #fff0f3;
            font-family: sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- Titre Adaptatif --- */
        h1 {
            font-family: lovecustom, cursive;
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4d6d;
            font-size: 8vw; /* Un peu plus gros pour la lisibilité */
            width: 90%; /* Prend presque toute la largeur */
            margin: 0;
            z-index: 110;
            text-align: center; /* Centre le texte à l'intérieur du bloc */
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.2; /* Espace entre les lignes si ça coupe */
        }
        
        /* Sur ordi, on limite la taille pour pas que ce soit énorme */
        @media (min-width: 800px) { 
            h1 { 
                font-size: 2.5rem; 
                white-space: nowrap; /* Sur ordi on peut rester sur une ligne */
            } 
        }

        /* --- Cadeau --- */
        .gift-wrapper {
            position: absolute;
            top: 55%;
            left: 50%;
            font-size: 150px;
            cursor: pointer;
            user-select: none;
            z-index: 100;
            /* On force l'affichage émoji standard */
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
            animation: jitter 2s infinite;
        }

        @keyframes jitter {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            10% { transform: translate(-50%, -50%) scale(1.1) rotate(-3deg); }
            20% { transform: translate(-50%, -50%) scale(1.1) rotate(3deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        }

        /* --- Bouton Final --- */
        #secret-link {
            display: none;
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background: #ff4d6d;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 120;
            
            /* Centrage parfait du texte à l'intérieur */
            display: none; /* Changé en 'flex' par le JS */
            justify-content: center;
            align-items: center;
            text-align: center;
            min-width: 200px;
            transition: transform 0.2s;
        }

        #secret-link:active { transform: translateX(-50%) scale(0.9); }

        /* Style des cœurs */
        .heart {
            position: absolute;
            pointer-events: none;
            z-index: 50;
            font-size: 50px;
        }
    </style>
</head>
<body>

    <h1 id="title">Ouvre ton cadeau my LOML !</h1>
    <div class="gift-wrapper" id="giftBox">🎁</div>
    <a href="TON_LIEN_ICI" id="secret-link">Clique ici mon amour</a>

    <script>
        document.getElementById('giftBox').addEventListener('click', function() {
            const gift = this;
            const link = document.getElementById('secret-link');
            const title = document.getElementById('title');

            gift.style.display = "none";
            title.style.opacity = "0";

            // 1. On augmente le nombre à 80 cœurs pour bien remplir le petit écran
            const heartCount = 80; 
            
            for (let i = 0; i < heartCount; i++) {
                // On décale légèrement le départ de chaque cœur pour un effet fluide
                setTimeout(() => {
                    createHeart();
                }, i * 20); 
            }

            setTimeout(() => {
                title.innerText = "Joyeux 2 ans ma chérie !";
                title.style.opacity = "1";
                link.style.display = "flex"; 
            }, 2000);
        });

        function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    
    // On remplace l'émoji par un dessin SVG (un vrai coeur rouge)
    heart.innerHTML = `
        <svg viewBox="0 0 32 32" width="100%" height="100%">
            <path fill="#ff4d6d" d="M16 28.225l-2.1-1.91c-7.46-6.76-12.4-11.23-12.4-16.765 0-4.515 3.535-8.05 8.05-8.05 2.545 0 4.985 1.185 6.45 3.05 1.465-1.865 3.905-3.05 6.45-3.05 4.515 0 8.05 3.535 8.05 8.05 0 5.535-4.94 10.005-12.4 16.765l-2.1 1.91z"/>
        </svg>
    `;
    
    // Taille aléatoire
    const size = Math.random() * 40 + 30; // Entre 30px et 70px
    heart.style.width = size + "px";
    heart.style.height = size + "px";
    
    // Position de départ centre
    heart.style.left = "50%";
    heart.style.top = "50%";
    
    document.body.appendChild(heart);

    // Trajectoire
    const angle = Math.random() * Math.PI * 2;
    const velocity = 35 + Math.random() * 50; 
    const destX = Math.cos(angle) * velocity + "vw";
    const destY = Math.sin(angle) * velocity + "vh";

    const anim = heart.animate([
        { 
            transform: 'translate(-50%, -50%) scale(0) rotate(0deg)', 
            opacity: 1 
        },
        { 
            transform: `translate(calc(-50% + ${destX}), calc(-50% + ${destY})) scale(1.5) rotate(${Math.random() * 90}deg)`, 
            opacity: 0.8 
        },
        { 
            transform: `translate(calc(-50% + ${destX}), calc(-50% + ${destY} + 15vh)) scale(1) rotate(0deg)`, 
            opacity: 0 
        }
    ], {
        duration: 3000 + Math.random() * 1500,
        easing: 'ease-out'
    });

    anim.onfinish = () => heart.remove();
}
    </script>
</body>
</html>
